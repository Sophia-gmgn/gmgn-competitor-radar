name: check-dune
on:
  workflow_dispatch: {}
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install httpx
      - name: Check Dune key
        env:
          DUNE_API_KEY: ${{ secrets.DUNE_API_KEY }}
        run: python check_dune.py
