# =====================================================================
# gmgn-competitor-radar · 配置
# =====================================================================

# ==== X 话题日报（#1 · Haze）====
# 覆盖的主体：GMGN 自己 + 核心竞品。
# terms = 搜索线索（名称/别名/官方号）。名字太泛的（Axiom/Photon/Trojan/Moby）加了
#         加密/交易语境词收窄，Grok 也会在 prompt 里被要求“只算加密 meme 交易语境”。
# self: true 的是我们自己（GMGN），文案上作“自身舆情”处理。
# —— 跑过一次测试后，按结果调这里的 terms 最有效（噪音多就收窄、漏了就放宽）——
x_topics:
  subjects:
    - key: gmgn
      label: GMGN
      terms: "GMGN OR gmgn.ai OR @gmgnai"
      self: true
      tier: core
    - key: debot
      label: DeBot
      terms: "DeBot OR @Debot_Official"
      tier: core
    - key: axiom
      label: Axiom
      terms: "Axiom (Solana OR meme OR trading OR bot OR crypto) OR @AxiomExchange"
      tier: core
    - key: basedbot
      label: BasedBot
      terms: "BasedBot OR @BasedBot"
      tier: core
    - key: photon
      label: Photon
      terms: "Photon (Solana OR trading OR bot OR meme) OR @tradewithPhoton"
      tier: core
    - key: trojan
      label: Trojan
      terms: "Trojan (Solana OR trading OR bot OR meme) OR @TrojanOnSolana"
      tier: core
    - key: terminal
      label: Terminal
      terms: "Terminal (Solana OR memecoin OR trading OR Padre) OR @TradingTerminal OR Padre.gg"
      tier: core
    - key: pumpfun
      label: Pump.fun
      terms: "Pump.fun OR pumpfun OR @Pumpfun"
      tier: core
    - key: fomo
      label: FOMO
      terms: "(FOMO OR @fomo) (Solana OR memecoin OR trading OR bot OR fomo.family OR app) OR fomo.family"
      tier: core

    - key: bonkbot
      label: BONKbot
      terms: "BONKbot OR Bonk Bot OR Telemetry OR @bonkbot_io"
      tier: minor
    - key: bananagun
      label: Banana Gun
      terms: "Banana Gun OR BananaGun OR Banana Pro OR @BananaGun"
      tier: minor
    - key: maestro
      label: Maestro
      terms: "Maestro (Solana OR trading OR bot OR meme) OR Maestro Bots OR @MaestroBots"
      tier: minor
    - key: bloom
      label: Bloom
      terms: "Bloom (Solana OR trading OR bot OR meme) OR Bloom Bot OR @BloomTrading"
      tier: minor
    - key: jupiter
      label: Jupiter
      terms: "(Jupiter OR JUP) (Solana OR memecoin OR DEX OR aggregator OR swap OR perps) OR @JupiterExchange OR jup.ag"
      tier: minor
  hours: 24               # 回看小时数
  per_subject_topics: 6   # 每个主体最多归纳几个话题


# ==== 竞品功能更新（#2 + #4 + #3 · Jerry/Nate/Haze）====
# 每个竞品可配两种源（有一个就行，可都配）：
#   telegram_channel   : 公开广播频道的用户名（读 t.me/s/<名>，无需 bot）
#   discord_channel_id : 你自己服务器里“Follow 了竞品公告频道”的那个频道 ID（需 DISCORD_BOT_TOKEN）
# 加竞品 = 加一条。找不到可读源的竞品（Photon/Trojan/Moby 等）先不放。
feature_updates:
  competitors:
    - key: debot
      label: DeBot
      discord_channel_id: "1525442051876061295"
    - key: axiom
      label: Axiom
      discord_channel_id: "1525481473120010300"
    - key: basedbot
      label: BasedBot
      discord_channel_id: "1525484620983046215"
    - key: bananagun
      label: Banana Gun
      telegram_channel: bananagunannouncements
  hours: 168

