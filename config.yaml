# ==== X 话题日报（#1 · Haze）====
# 覆盖的主体：GMGN 自己 + 核心竞品。
# terms = 搜索线索（名称/别名/官方号）。名字太泛的（Axiom/Photon/Trojan/Moby）加了
#         加密/交易语境词收窄，Grok 也会在 prompt 里被要求“只算加密 meme 交易语境”。
# self: true 的是我们自己（GMGN），文案上作“自身舆情”处理。
# —— 跑过一次测试后，按结果调这里的 terms 最有效（噪音多就收窄、漏了就放宽）——
x_topics:
  subjects:
    - key: gmgn
      label: GMGN
      terms: "GMGN OR gmgn.ai OR @gmgnai"
      self: true
      tier: core
    - key: debot
      label: DeBot
      terms: "DeBot OR @Debot_Official"
      tier: core
    - key: axiom
      label: Axiom
      terms: "Axiom (Solana OR meme OR trading OR bot OR crypto) OR @AxiomExchange"
      tier: core
    - key: basedbot
      label: BasedBot
      terms: "BasedBot OR @BasedBot"
      tier: core
    - key: photon
      label: Photon
      terms: "Photon (Solana OR trading OR bot OR meme) OR @tradewithPhoton"
      tier: core
    - key: trojan
      label: Trojan
      terms: "Trojan (Solana OR trading OR bot OR meme) OR @TrojanOnSolana"
      tier: core
    - key: terminal
      label: Terminal
      terms: "Terminal (Solana OR memecoin OR trading OR Padre) OR @TradingTerminal OR Padre.gg"
      tier: core
    - key: pumpfun
      label: Pump.fun
      terms: "Pump.fun OR pumpfun OR @Pumpfun"
      tier: core
    - key: fomo
      label: FOMO
      terms: "(FOMO OR @fomo) (Solana OR memecoin OR trading OR bot OR fomo.family OR app) OR fomo.family"
      tier: core

    - key: bonkbot
      label: BONKbot
      terms: "BONKbot OR Bonk Bot OR Telemetry OR @bonkbot_io"
      tier: minor
    - key: bananagun
      label: Banana Gun
      terms: "Banana Gun OR BananaGun OR Banana Pro OR @BananaGun"
      tier: minor
    - key: maestro
      label: Maestro
      terms: "Maestro (Solana OR trading OR bot OR meme) OR Maestro Bots OR @MaestroBots"
      tier: minor
    - key: bloom
      label: Bloom
      terms: "Bloom (Solana OR trading OR bot OR meme) OR Bloom Bot OR @BloomTrading"
      tier: minor
    - key: jupiter
      label: Jupiter
      terms: "(Jupiter OR JUP) (Solana OR memecoin OR DEX OR aggregator OR swap OR perps) OR @JupiterExchange OR jup.ag"
      tier: minor
  hours: 24               # 回看小时数
  per_subject_topics: 6   # 每个主体最多归纳几个话题


# ==== 竞品功能更新（#2 + #4 + #3 · Jerry/Nate/Haze）====
# 每个竞品可配两种源（有一个就行，可都配）：
#   telegram_channel   : 公开广播频道的用户名（读 t.me/s/<名>，无需 bot）
#   discord_channel_id : 你自己服务器里“Follow 了竞品公告频道”的那个频道 ID（需 DISCORD_BOT_TOKEN）
# 加竞品 = 加一条。找不到可读源的竞品（Photon/Trojan/Moby 等）先不放。
feature_updates:
  competitors:
    # —— 原有：有 Discord / TG / 官网JS 源，保留；顺带加官方 X ——
    - key: debot
      label: DeBot
      x_account: Debot_Official          # 已核实
      discord_channel_id: "1525442051876061295"
      web_js: debot
    - key: axiom
      label: Axiom
      x_account: AxiomExchange           # 已核实（另有产品更新号 @AxiomUpdate，可换）
      discord_channel_id: "1525481473120010300"
    - key: basedbot
      label: Based Bot
      x_account: BasedBot                # 已确认
      discord_channel_id: "1525484620983046215"
      web_js: basedbot
    - key: bananagun
      label: Banana Gun
      x_account: BananaGun                # 已确认
      telegram_channel: bananagunannouncements
    # —— 新增：仅监控官方 X ——
    - key: pumpfun
      label: Pump.fun
      x_account: pumpdotfun              # 已核实
    - key: terminal
      label: Terminal
      x_account: tradingterminal         # 待核：Pump.fun 收购的账号，改名后用户名可能变
    - key: trojan
      label: Trojan
      x_account: TrojanOnSolana          # 已核实
    - key: fomo
      label: FOMO
      x_account: fomo                    # 已核实（原 @tryfomo）
    - key: jupiter
      label: Jupiter
      x_account: JupiterExchange         # 已核实
    - key: photon
      label: Photon
      x_account: tradewithPhoton                # 已确认
    - key: bonkbot
      label: BONKbot
      x_account: bonkbot_io                # 已确认
    - key: maestro
      label: Maestro
      x_account: MaestroBots                # 已确认
    - key: bloom
      label: Bloom
      x_account: BloomTrading                # 已确认
  hours: 168

  # 集合页是否显示「核心/次要总表」：false=不显示（数据仍保留在下方 directory，需要时改 true 即可）
  show_directory: false

  # 第三源：同事的社群监控页（已判级的表）——脚本会读它、解析并入看板（跨源自动去重）
  community_page: "2307817515"

  # ——— 集合页底部「竞品监控清单」渲染用（核心/次要总表）———
  # 纯展示数据：官方X / 官网 / 社群入口 + ②接入状态。（待核）= 待从官网核实，空=待补。
  # monitor 非「待接入」的值＝已接入②，渲染成绿色标签。改 X 账号时顺带同步上面 competitors。
  directory:
    # —— 核心竞品（重点监控）——
    - { label: Axiom,                 tier: core,  x: "@AxiomExchange / @AxiomUpdate", site: "axiom.trade",             tg: "无",                          discord: "discord.gg/axiomtrade",       monitor: "Discord" }
    - { label: "Terminal（原 Padre）", tier: core,  x: "@tradingterminal（待核）",                site: "padre.gg",                tg: "无",                          discord: "discord.gg/padreapp",         monitor: "待接入" }
